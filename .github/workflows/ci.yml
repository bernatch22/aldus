name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The real gates: the full test suite (core runs the actual
      # create→extract→bake→re-extract cycle on real PDFs) + the editor build.
      - run: pnpm -r test
      - run: pnpm --filter @aldus/editor build

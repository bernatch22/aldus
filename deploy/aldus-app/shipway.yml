# Deploy el BACKEND de Aldus (server bundleado) a bc-web.
#   sync dist + start.mjs + package.json → npm install → pm2.
# nginx mapea  bernardocastro.dev/aldus/api/  →  127.0.0.1:4110/api/.
# El FRONTEND (SPA del editor, build con VITE_BASE=/aldus/) se monta NATIVO en
# la página /aldus de ~/bernardocastro.dev: los assets van a public/aldus/assets
# y dist/index.html se copia a src/data/aldus-index.html (manifest de hashes).
#
# Build ANTES de deployar (desde la raíz del repo aldus):
#   VITE_BASE=/aldus-app/ pnpm --filter @aldus/editor build && node deploy/aldus-app/build.mjs
#
# La key de OpenRouter vive en ~/aldus-app-svc/.env (0600, gitignored, box-local)
# — start.mjs la carga con dotenv. El agente va por OpenRouter (qwen/qwen3-coder).
name: aldus-app

host:
  ssh: berna@34.46.102.5
  key: ~/.ssh/google_compute_engine

remoteDir: ~/aldus-app-svc

# build reproducible: editor con base /aldus/ (nativo, servido en /aldus) + bundle.
build: cd ../.. && VITE_BASE=/aldus/ pnpm --filter @aldus/editor build && node deploy/aldus-app/build.mjs

exclude:
  - .env
  - node_modules
  - data

sync:
  - { local: ./dist/, remote: ~/aldus-app-svc/dist/ }
  - { local: ./start.mjs, remote: ~/aldus-app-svc/, delete: false }
  - { local: ./package.json, remote: ~/aldus-app-svc/, delete: false }

postSync: npm install --omit=dev --no-audit --no-fund

restart:
  method: pm2
  name: aldus-app
  # start.mjs carga .env (OPENROUTER_API_KEY) + fija provider + ALDUS_SESSION_SCOPED
  # (privacidad: cada visitante = cookie aldus_sid → dir aislado ~ALDUS_DATA/sessions/<sid>,
  # sembrado con copias de ~ALDUS_DATA/_samples). Uploads y ediciones NUNCA se cruzan
  # entre visitantes. ALDUS_DATA persiste todo; poblá _samples una vez con los PDFs base.
  start: ALDUS_PORT=4110 ALDUS_DATA=/home/berna/aldus-app-svc/data node start.mjs
